<svg xmlns="http://www.w3.org/2000/svg" width="640" height="120" viewBox="0 0 640 120">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6900"/>
      <stop offset="100%" style="stop-color:#ff8c33"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cat icon -->
  <g transform="translate(180, 15)">
    <!-- Cat ears -->
    <polygon points="25,25 35,5 45,25" fill="url(#orangeGrad)" opacity="0.9"/>
    <polygon points="55,25 65,5 75,25" fill="url(#orangeGrad)" opacity="0.9"/>
    <!-- Cat head -->
    <ellipse cx="50" cy="45" rx="32" ry="28" fill="url(#orangeGrad)" opacity="0.85"/>
    <!-- Eyes -->
    <ellipse cx="40" cy="42" rx="5" ry="6" fill="#1a1a2e"/>
    <ellipse cx="60" cy="42" rx="5" ry="6" fill="#1a1a2e"/>
    <!-- Eye shine -->
    <circle cx="42" cy="40" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="62" cy="40" r="2" fill="#ffffff" opacity="0.8"/>
    <!-- Nose -->
    <ellipse cx="50" cy="52" rx="3" ry="2" fill="#1a1a2e"/>
    <!-- Mouth -->
    <path d="M44,56 Q50,62 56,56" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <!-- Whiskers -->
    <line x1="20" y1="48" x2="38" y2="50" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="55" x2="38" y2="54" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="50" x2="80" y2="48" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="54" x2="80" y2="55" stroke="#1a1a2e" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Main title: Mimo Code -->
  <text x="295" y="72" fill="url(#orangeGrad)" font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" letter-spacing="-1" filter="url(#textGlow)">
    Mimo Code
  </text>

  <!-- Subtitle -->
  <text x="295" y="100" fill="#8888aa" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14" letter-spacing="2">
    CLI CODING AGENT · POWERED BY MiMo LLM
  </text>

  <!-- Decorative line -->
  <line x1="295" y1="108" x2="540" y2="108" stroke="url(#orangeGrad)" stroke-width="1" opacity="0.4"/>
</svg>
